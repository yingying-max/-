<title>太阳能路灯厂家</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif}
body{background:#f5f7fa;color:#333;line-height:1.6}
.container{width:92%;max-width:1200px;margin:0 auto;padding:20px 0}

/* 标题+logo容器 */
.header-title{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin:20px 0 10px;
}
/* logo样式：小尺寸、不抢眼 */
.logo{
  width:36px;
  height:36px;
  flex-shrink:0;
}
h1{
  font-size:26px;
  color:#222;
  text-align:center;
}

.subtitle{text-align:center;color:#666;margin-bottom:8px}
.contact{text-align:center;font-size:16px;color:#e53935;font-weight:bold;margin:10px 0 30px}
.contact span{margin:0 12px;color:#333}

/* 产品卡片 —— 图片完整显示，不裁切 */
.main-box{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:40px}
.main-item{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.main-item img{
width:100%;
height:auto;
display:block;
object-fit:contain;
}
.main-info{padding:12px}
.main-info h3{font-size:16px;margin-bottom:6px}
.main-info p{color:#f30;font-weight:bold;font-size:15px}
.main-info span{color:#999;font-size:13px;margin-left:6px}

.list-box{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.list-item{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
.list-item img{
width:100%;
height:auto;
display:block;
object-fit:contain;
}
.list-info{padding:10px}
.list-info p{color:#f30;font-weight:bold;font-size:14px}
.list-info span{color:#999;font-size:12px}

.title{font-size:18px;font-weight:bold;margin:20px 0 15px;color:#222;border-left:4px solid #f30;padding-left:10px}

/* 底部标语 */
.footer{text-align:center;margin-top:50px;padding:20px;background:#fff;border-radius:8px}
.footer p{font-size:16px;color:#666}
.footer strong{color:#e53935}

/* 移动端适配 */
@media(max-width:768px){
  .main-box{grid-template-columns:1fr}
  .list-box{grid-template-columns:repeat(2,1fr)}
  h1{font-size:22px}
  .logo{width:30px;height:30px}
}
</style>
</head>
